# helm/myrocketapp/values.yaml
# Default values — Jenkins overrides image.tag and image.repository at deploy time

replicaCount: 2

image:
  # YOUR ECR repository — Account: 051797965283, Region: ap-south-1
  repository: 051797965283.dkr.ecr.ap-south-1.amazonaws.com/divya-app
  pullPolicy: Always
  tag: "latest"   # Jenkins sets this to v${BUILD_NUMBER} at deploy time

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

# Health check settings
livenessProbe:
  path: /health
  port: 3000
  initialDelaySeconds: 15
  periodSeconds: 30

readinessProbe:
  path: /health
  port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
